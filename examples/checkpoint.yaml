# Checkpoint the running "counter-app" pod.
#
# The controller watches for this object, calls the kubelet checkpoint
# API, and updates .status when the checkpoint is saved to disk. The
# pod keeps running — checkpointing is non-disruptive.
apiVersion: checkpoint.k8s.io/v1alpha1
kind: PodCheckpoint
metadata:
  name: counter-checkpoint
  namespace: default
spec:
  sourcePodName: counter-app
