# This rule is not used by the project pod-snapshot-controller itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the checkpoint.checkpoint-restore.k8s.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: pod-snapshot-controller
    app.kubernetes.io/managed-by: kustomize
  name: pod-snapshot-controller-podrestore-editor-role
rules:
- apiGroups:
  - checkpoint.checkpoint-restore.k8s.io
  resources:
  - podrestores
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - checkpoint.checkpoint-restore.k8s.io
  resources:
  - podrestores/status
  verbs:
  - get
