# This rule is not used by the project pod-snapshot-controller itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over checkpoint.checkpoint-restore.k8s.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: pod-snapshot-controller
    app.kubernetes.io/managed-by: kustomize
  name: pod-snapshot-controller-podrestore-admin-role
rules:
- apiGroups:
  - checkpoint.checkpoint-restore.k8s.io
  resources:
  - podrestores
  verbs:
  - '*'
- apiGroups:
  - checkpoint.checkpoint-restore.k8s.io
  resources:
  - podrestores/status
  verbs:
  - get
