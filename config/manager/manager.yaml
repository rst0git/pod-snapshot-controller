apiVersion: v1
kind: Namespace
metadata:
  labels:
    control-plane: pod-snapshot-controller
    app.kubernetes.io/name: pod-snapshot-controller
    app.kubernetes.io/managed-by: kustomize
  name: pod-snapshot-controller-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pod-snapshot-controller
  namespace: pod-snapshot-controller-system
  labels:
    control-plane: pod-snapshot-controller
    app.kubernetes.io/name: pod-snapshot-controller
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: pod-snapshot-controller
      app.kubernetes.io/name: pod-snapshot-controller
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: pod-snapshot-controller
      labels:
        control-plane: pod-snapshot-controller
        app.kubernetes.io/name: pod-snapshot-controller
    spec:
      # TODO: Uncomment the following code to configure the nodeAffinity expression
      # according to the platforms which are supported by your solution.
      # It is considered best practice to support multiple architectures. You can
      # build your controller image using the makefile target docker-buildx.
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #         - matchExpressions:
      #           - key: kubernetes.io/arch
      #             operator: In
      #             values:
      #               - amd64
      #               - arm64
      #               - ppc64le
      #               - s390x
      #           - key: kubernetes.io/os
      #             operator: In
      #             values:
      #               - linux
      securityContext:
        # Projects are configured by default to adhere to the "restricted" Pod Security Standards.
        # This ensures that deployments meet the highest security requirements for Kubernetes.
        # For more details, see: https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - command:
        - /pod-snapshot-controller
        args:
          - --leader-elect
          - --health-probe-bind-address=:8081
        image: controller:latest
        name: pod-snapshot-controller
        ports: []
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        # TODO: Configure the resources accordingly based on the project requirements.
        # More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        volumeMounts: []
      volumes: []
      serviceAccountName: pod-snapshot-controller
      terminationGracePeriodSeconds: 10
