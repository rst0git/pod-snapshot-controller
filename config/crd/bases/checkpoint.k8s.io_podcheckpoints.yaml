                items:
                  description: |-
                    CheckpointContainerInfo stores the name and image of a checkpointed container
                    so that the restore controller can create a Pod with matching container specs.
                  properties:
                    image:
                      description: image is the container image.
                      type: string
                    name:
                      description: name is the Kubernetes container name.
                      type: string
                  required:
                  - image
                  - name
                  type: object
                type: array
              nodeName:
                description: nodeName is the node where the source Pod was running
                  when checkpointed.
                type: string
              phase:
                description: 'phase represents the current phase: Pending, InProgress,
                  Ready, Failed.'
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
