    controller-gen.kubebuilder.io/version: v0.20.1
  name: podcheckpoints.checkpoint.k8s.io
spec:
  group: checkpoint.k8s.io
  names:
    kind: PodCheckpoint
    listKind: PodCheckpointList
    plural: podcheckpoints
    singular: podcheckpoint
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.sourcePodName
      name: Source Pod
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.nodeName
      name: Node
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          PodCheckpoint is the Schema for the podcheckpoints API.
          It represents a checkpoint (snapshot) of all containers in a Pod.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of PodCheckpoint.
            properties:
              sourcePodName:
                description: sourcePodName is the name of the running Pod to checkpoint.
                minLength: 1
                type: string
              timeoutSeconds:
                description: |-
                  timeoutSeconds is the timeout for the checkpoint operation in seconds.
                  0 means use the container runtime default.
                format: int64
                minimum: 0
                type: integer
            required:
            - sourcePodName
            type: object
          status:
            description: status defines the observed state of PodCheckpoint.
            properties:
              checkpointLocation:
                description: checkpointLocation is the path to the checkpoint data
                  on the node.
                type: string
              conditions:
                description: conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
